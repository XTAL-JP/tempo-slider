<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1d"/>
      <stop offset="100%" stop-color="#0f0f12"/>
    </linearGradient>
    <linearGradient id="thumb2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0a0a8"/>
      <stop offset="100%" stop-color="#3e3e44"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="128" height="128" rx="22" fill="url(#bg2)"/>

  <!-- レール（縦） -->
