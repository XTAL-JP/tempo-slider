<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1d"/>
      <stop offset="100%" stop-color="#0f0f12"/>
    </linearGradient>
    <linearGradient id="thumb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a8a92"/>
      <stop offset="100%" stop-color="#3e3e44"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="127" height="127" rx="22" fill="none" stroke="rgba(255,255,255,0.12)"/>

  <!-- 目盛り（縦に並ぶ細い横線） -->
  <g fill="rgba(255,255,255,0.35)">
    <rect x="38" y="18"  width="52" height="1.5"/>
    <rect x="38" y="28"  width="52" height="1.5"/>
    <rect x="38" y="38"  width="52" height="1.5"/>
    <rect x="38" y="48"  width="52" height="1.5"/>
    <rect x="38" y="58"  width="52" height="1.5"/>
    <rect x="38" y="68"  width="52" height="1.5"/>
    <rect x="38" y="78"  width="52" height="1.5"/>
    <rect x="38" y="88"  width="52" height="1.5"/>
    <rect x="38" y="98"  width="52" height="1.5"/>
    <rect x="38" y="108" width="52" height="1.5"/>
  </g>

  <!-- 中央の0点緑LED -->
  <rect x="34" y="62" width="6" height="4" rx="1" fill="#50ff80" opacity="0.95"/>
  <rect x="34" y="62" width="6" height="4" rx="1" fill="#50ff80" filter="blur(2px)" opacity="0.6"/>

  <!-- TEMPOフェーダーレール -->
  <rect x="61" y="18" width="6" height="92" rx="3" fill="rgba(255,255,255,0.15)"/>

  <!-- Thumb（少し下＝+方向） -->
  <rect x="46" y="76" width="36" height="11" rx="2" fill="url(#thumb)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <rect x="50" y="81" width="28" height="1" fill="rgba(0,0,0,0.4)"/>
</svg>
